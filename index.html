<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🕌 ISLAM MOÇAMBIQUE 🕌</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-green: #1a5f4a; --dark-green: #0d3d2d;
            --gold: #d4af37; --cream: #f5f5dc; --white: #ffffff;
        }
        body { font-family: 'Cairo', sans-serif; background-color: var(--cream); overflow-x: hidden; }
        
        /* Loader Corrigido */
        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--dark-green); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 9999; 
        }

        /* Telas */
        .auth-screen { position: fixed; inset: 0; background: var(--primary-green); display: flex; align-items: center; justify-content: center; z-index: 9000; padding: 20px; }
        .app-container { display: none; padding-top: 70px; }
        .hidden { display: none !important; }

        /* Cabeçalho */
        .app-header { background: var(--dark-green); color: white; padding: 15px; position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; z-index: 1000; }
        
        /* Menu */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        .menu-item { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .menu-item i { font-size: 2rem; color: var(--primary-green); margin-bottom: 10px; }

        /* Iframe WebView */
        #webview-container { position: fixed; inset: 0; background: white; z-index: 10001; display: none; flex-direction: column; }
        .webview-header { background: var(--dark-green); color: white; padding: 15px; display: flex; align-items: center; gap: 10px; }
        iframe { flex: 1; border: none; width: 100%; }
        
        .btn-gold { background: var(--gold); color: var(--dark-green); border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <div id="loader">
        <i class="fas fa-mosque fa-3x" style="color: var(--gold); margin-bottom: 15px;"></i>
        <p style="color: white;">Iniciando...</p>
    </div>

    <div class="auth-screen" id="login-screen">
        <div style="background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 350px;">
            <h2 style="text-align: center; margin-bottom: 20px;">Entrar</h2>
            <input type="tel" id="login-phone" placeholder="Telemóvel (ex: 84...)">
            <button class="btn-gold" onclick="entrar()">ENTRAR</button>
        </div>
    </div>

    <div class="app-container" id="app-main">
        <div class="app-header">
            <span id="user-info">Usuário</span>
            <div>
                <span id="user-stars">⭐ 0</span>
                <span id="pro-tag" style="display:none; background: var(--gold); padding: 2px 5px; border-radius: 5px; font-size: 10px; margin-left:5px;">PRO</span>
            </div>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="abrirLink('https://docs.google.com/document/d/1hbf3t_GA-CIK0xVl6QOtow-InPC88ERGYNHupCNuNY8/preview', '7 Kalimahs')">
                <i class="fas fa-book-open"></i><br>7 Kalimahs
            </div>
            <div class="menu-item" onclick="abrirLink('https://docs.google.com/document/d/1V1LBzbZflRYVAxp6xDK6JuN-MHbIAGa3/preview', 'Duãs Diárias')">
                <i class="fas fa-hands-praying"></i><br>Duãs Diárias
            </div>
            <div class="menu-item" onclick="ganharEstrela()">
                <i class="fas fa-star" style="color:var(--gold)"></i><br>Ganhar Estrela
            </div>
            <div class="menu-item" onclick="ativarPro()">
                <i class="fas fa-crown" style="color:var(--gold)"></i><br>Nível Pro
            </div>
        </div>
    </div>

    <div id="webview-container">
        <div class="webview-header">
            <button onclick="fecharLink()" style="background:none; border:none; color:white; font-size: 20px;"><i class="fas fa-times"></i></button>
            <span id="wv-titulo">Documento</span>
        </div>
        <iframe id="wv-frame"></iframe>
    </div>

    <script>
        // Forçar saída do loader ao carregar a página
        window.onload = () => {
            document.getElementById('loader').classList.add('hidden');
        };

        let db = { stars: 0, phone: "", isPro: false };

        function entrar() {
            const p = document.getElementById('login-phone').value;
            if(p.length < 4) return alert("Insira um número válido");
            db.phone = p;
            document.getElementById('user-info').innerText = p;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-main').style.display = 'block';
        }

        function abrirLink(url, titulo) {
            document.getElementById('wv-titulo').innerText = titulo;
            document.getElementById('wv-frame').src = url;
            document.getElementById('webview-container').style.display = 'flex';
        }

        function fecharLink() {
            document.getElementById('webview-container').style.display = 'none';
            document.getElementById('wv-frame').src = "";
        }

        function ganharEstrela() {
            if(db.stars < 50) {
                db.stars += 10;
                document.getElementById('user-stars').innerText = "⭐ " + db.stars;
                alert("Você ganhou 10 estrelas!");
            } else {
                alert("Limite diário de 50 atingido!");
            }
        }

        function ativarPro() {
            const cod = prompt("Insira o Código Pro (Enviado após pagar 25MTN):");
            if(!cod) return;
            
            // Lógica de validação (converte os 4 últimos dígitos do tel em letras)
            const mapa = ['A','B','C','D','E','F','G','H','I','J'];
            let esperado = "";
            const ultimos4 = db.phone.slice(-4);
            for(let n of ultimos4) esperado += mapa[parseInt(n)];

            if(cod.toUpperCase() === esperado) {
                db.isPro = true;
                document.getElementById('pro-tag').style.display = 'inline';
                alert("PARABÉNS! Nível PRO Ativado.");
            } else {
                alert("Código incorreto!");
            }
        }
    </script>
</body>
</html>
