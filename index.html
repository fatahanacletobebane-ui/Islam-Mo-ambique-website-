<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<div id="custom-webview" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background:white; flex-direction:column;">
    <div style="background:#1a5f4a; color:white; padding:15px; display:flex; align-items:center;">
        <button onclick="fecharNavegador()" style="background:orange; border:none; padding:10px; border-radius:5px; margin-right:15px;">VOLTAR</button>
        <span id="wv-titulo">Documento</span>
    </div>
    <iframe id="frame-docs" style="flex:1; border:none; width:100%;"></iframe>
</div>

<script>
// --- LÓGICA DAS ESTRELAS (LIMITE DE 50) ---
function adicionarEstrelas(quantidade) {
    // Busca o valor atual no seu nó do Firebase
    database.ref('usuarios/' + userLogado.fone + '/stars').once('value').then((snapshot) => {
        let estrelasAtuais = snapshot.val() || 0;
        
        if (estrelasAtuais + quantidade <= 50) {
            database.ref('usuarios/' + userLogado.fone).update({
                stars: estrelasAtuais + quantidade
            });
            alert("Você ganhou " + quantidade + " estrelas!");
        } else {
            alert("Limite máximo de 50 estrelas atingido!");
        }
    });
}

// --- LÓGICA DO NÍVEL PRO (CÓDIGO SECRETO) ---
function ativarNivelPro() {
    const codigoDigitado = prompt("Digite o código de ativação (25 MTN):");
    if(!codigoDigitado) return;

    // Converte os últimos 4 dígitos do telefone do seu nó em letras
    const mapaLetras = ['A','B','C','D','E','F','G','H','I','J'];
    let codigoEsperado = "";
    const foneString = userLogado.fone.toString();
    const ultimos4 = foneString.slice(-4);

    for(let num of ultimos4) {
        codigoEsperado += mapaLetras[parseInt(num)];
    }

    if(codigoDigitado.toUpperCase() === codigoEsperado) {
        database.ref('usuarios/' + userLogado.fone).update({
            isPro: true
        });
        alert("Nível PRO ativado com sucesso!");
    } else {
        alert("Código incorreto! Fale com o administrador.");
    }
}

// --- LÓGICA DA WEBVIEW INTERNA ---
function abrirDocumento(url, titulo) {
    // Adiciona /preview para o Google permitir carregar no iframe
    const previewUrl = url.replace('/edit', '/preview');
    document.getElementById('wv-titulo').innerText = titulo;
    document.getElementById('frame-docs').src = previewUrl;
    document.getElementById('custom-webview').style.display = 'flex';
}

function fecharNavegador() {
    document.getElementById('custom-webview').style.display = 'none';
    document.getElementById('frame-docs').src = "";
}
</script>
