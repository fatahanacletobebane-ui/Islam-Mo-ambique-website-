<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🕋 ISLAM MOÇAMBIQUE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --p-green: #1a5f4a; 
            --d-green: #0d3d2d; 
            --gold: #d4af37; 
            --white: #ffffff; 
            --cream: #f5f5dc;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--cream); color: #333; overflow-x: hidden; }

        /* Sistema de Telas */
        .tela { display: none; min-height: 100vh; width: 100%; }
        .tela.active { display: flex; flex-direction: column; }

        /* Design da Tela de Registro/Login */
        #registro-tela { 
            background: linear-gradient(135deg, var(--d-green), var(--p-green)); 
            align-items: center; 
            justify-content: center; 
            color: var(--gold); 
            position: fixed;
            inset: 0;
            z-index: 9999;
        }
        .box-registro { 
            background: rgba(0,0,0,0.3); 
            padding: 30px; 
            border-radius: 20px; 
            width: 90%; 
            max-width: 380px; 
            text-align: center; 
            border: 1px solid rgba(212, 175, 55, 0.3);
            backdrop-filter: blur(10px);
        }
        .box-registro h1 { font-size: 2rem; margin-bottom: 20px; letter-spacing: 2px; }
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 10px; 
            border: none; 
            font-size: 1rem;
            outline: none;
            color: #333;
        }
        .btn-entrar { 
            width: 100%; 
            padding: 15px; 
            background: var(--gold); 
            color: var(--d-green); 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 1.1rem;
            cursor: pointer; 
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Design do App Principal */
        header { 
            background: var(--d-green); 
            color: white; 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: fixed; 
            top: 0; 
            width: 100%; 
            z-index: 100;
        }
        .user-pill { display: flex; align-items: center; gap: 8px; font-weight: 600; }
        .stars-pill { color: var(--gold); font-weight: bold; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; }

        .main-container { padding: 90px 20px 20px; max-width: 600px; margin: 0 auto; width: 100%; }
        .status-card { 
            background: var(--p-green); 
            color: white; 
            padding: 20px; 
            border-radius: 15px; 
            text-align: center; 
            margin-bottom: 20px;
        }

        /* Grid de Menu */
        .menu-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
        }
        .menu-item { 
            background: white; 
            padding: 20px 5px; 
            border-radius: 15px; 
            text-align: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            cursor: pointer; 
            border: 1px solid #f0f0f0;
        }
        .menu-item i { font-size: 1.8rem; color: var(--p-green); margin-bottom: 8px; display: block; }
        .menu-item span { font-size: 0.75rem; font-weight: bold; color: #555; }
        .menu-item.btn-gold { background: var(--gold); border: none; }

        /* Modais */
        .modal { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.8); 
            display: none; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000; 
            padding: 20px; 
        }
        .modal.active { display: flex; }
        .modal-box { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 350px; position: relative; }
    </style>
</head>
<body>

    <!-- TELA DE REGISTRO/LOGIN -->
    <div id="registro-tela" class="tela active">
        <div class="box-registro">
            <i class="fas fa-mosque fa-3x"></i>
            <h1 style="margin-top:10px">ISLAM MZ</h1>
            <p style="margin-bottom:20px; font-size:0.9rem">Crie a sua conta local</p>
            <input type="text" id="reg-nome" placeholder="Nome Completo">
            <input type="tel" id="reg-fone" placeholder="Número de Telemóvel">
            <button class="btn-entrar" onclick="finalizarRegistro()">CRIAR CONTA E ENTRAR</button>
        </div>
    </div>

    <!-- TELA PRINCIPAL -->
    <div id="app-tela" class="tela">
        <header>
            <div class="user-pill">
                <i class="fas fa-user-circle"></i>
                <span id="ui-nome">...</span>
                <span id="ui-pro-tag" class="tag-pro" style="display:none; background:var(--gold); color:var(--d-green); font-size:10px; padding:2px 5px; border-radius:3px">PRO</span>
            </div>
            <div class="stars-pill">
                <i class="fas fa-star"></i> <span id="ui-stars">100</span>
            </div>
            <button onclick="fazerLogout()" style="background:none; border:none; color:white;"><i class="fas fa-power-off"></i></button>
        </header>

        <div class="main-container">
            <div class="status-card">
                <h2 id="ui-saudacao">Assalamu Alaikum</h2>
                <p id="ui-status-texto">Nível Básico</p>
            </div>

            <div class="menu-grid">
                <div class="menu-item" onclick="executarAcao('quran')"><i class="fas fa-quran"></i><span>Alcorão</span></div>
                <div class="menu-item" onclick="executarAcao('tasbih')"><i class="fas fa-fingerprint"></i><span>Tasbih</span></div>
                <div class="menu-item" onclick="abrirModal('modal-pro')"><i class="fas fa-crown"></i><span>PRO</span></div>
                <div class="menu-item btn-gold" onclick="abrirModal('modal-apoio')"><i class="fas fa-heart"></i><span>Apoiar</span></div>
                <div class="menu-item" onclick="executarAcao('horarios')"><i class="fas fa-clock"></i><span>Horários</span></div>
                <div class="menu-item" onclick="executarAcao('ajuda')"><i class="fas fa-info-circle"></i><span>Ajuda</span></div>
            </div>
        </div>
    </div>

    <!-- MODAL APOIO -->
    <div id="modal-apoio" class="modal">
        <div class="modal-box">
            <h4>Apoiar</h4>
            <p style="font-size:13px; margin:15px 0;">M-Pesa: 1228803 (BEBANE)<br>BIM: 000100000012473356257</p>
            <button class="btn-entrar" onclick="fecharModal('modal-apoio')">VOLTAR</button>
        </div>
    </div>

    <!-- MODAL PRO -->
    <div id="modal-pro" class="modal">
        <div class="modal-box">
            <h4>Ativar PRO</h4>
            <p style="font-size:11px; text-align:center">Converta os últimos 4 dígitos: 0=A, 1=B, 2=C...</p>
            <input type="text" id="input-codigo-pro" style="border:1px solid #ddd; text-align:center; letter-spacing:5px" maxlength="4">
            <button class="btn-entrar" onclick="validarCodigoPro()">ATIVAR</button>
            <button onclick="fecharModal('modal-pro')" style="width:100%; border:none; background:none; margin-top:10px; color:#999">Cancelar</button>
        </div>
    </div>

    <script>
        let usuario = { nome: "", fone: "", estrelas: 100, isPro: false };
        const dicionarioPro = {'0':'A','1':'B','2':'C','3':'D','4':'E','5':'F','6':'G','7':'H','8':'I','9':'J'};

        // FUNÇÃO DE INICIALIZAÇÃO (O "Coração" do Login)
        window.onload = function() {
            const dadosSalvos = localStorage.getItem('islam_mz_v5');
            if (dadosSalvos) {
                usuario = JSON.parse(dadosSalvos);
                if (usuario.nome && usuario.fone) {
                    atualizarInterface();
                    trocarTela('app-tela');
                }
            }
        };

        function finalizarRegistro() {
            const n = document.getElementById('reg-nome').value.trim();
            const f = document.getElementById('reg-fone').value.trim();

            if (n.length < 2 || f.length < 5) {
                alert("Por favor, preencha o nome e o número corretamente.");
                return;
            }

            usuario.nome = n;
            usuario.fone = f;
            usuario.estrelas = 100;
            usuario.isPro = false;

            salvarDados();
            atualizarInterface();
            trocarTela('app-tela');
        }

        function executarAcao(tipo) {
            if (!usuario.isPro) {
                if (usuario.estrelas < 7) {
                    alert("Estrelas insuficientes! Custo: 7 estrelas.");
                    return;
                }
                usuario.estrelas -= 7;
                salvarDados();
                atualizarInterface();
            }

            if (tipo === 'quran') window.open('https://quran.com/pt', '_blank');
            else alert("Funcionalidade em breve!");
        }

        function validarCodigoPro() {
            const inputVal = document.getElementById('input-codigo-pro').value.toUpperCase().trim();
            const ultimosQuatro = usuario.fone.slice(-4);
            let codigoEsperado = "";
            for (let d of ultimosQuatro) codigoEsperado += dicionarioPro[d] || "";

            if (inputVal === codigoEsperado && codigoEsperado !== "") {
                usuario.isPro = true;
                usuario.estrelas = 99999;
                salvarDados();
                atualizarInterface();
                fecharModal('modal-pro');
                alert("Nível PRO Ativado!");
            } else {
                alert("Código errado!");
            }
        }

        function salvarDados() { localStorage.setItem('islam_mz_v5', JSON.stringify(usuario)); }

        function atualizarInterface() {
            document.getElementById('ui-nome').innerText = usuario.nome.split(' ')[0];
            document.getElementById('ui-stars').innerText = Math.floor(usuario.estrelas);
            if (usuario.isPro) {
                document.getElementById('ui-pro-tag').style.display = "inline-block";
                document.getElementById('ui-status-texto').innerText = "Acesso PRO Ilimitado";
            }
        }

        function trocarTela(id) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function abrirModal(id) { document.getElementById(id).classList.add('active'); }
        function fecharModal(id) { document.getElementById(id).classList.remove('active'); }

        function fazerLogout() {
            if (confirm("Sair apaga os dados locais. Continuar?")) {
                localStorage.removeItem('islam_mz_v5');
                location.reload();
            }
        }
    </script>
</body>
</html>
